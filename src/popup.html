<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trigger rate blocker</title>
    <style>
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial;margin:0;background:#fff;color:#111}
      .wrap{width:300px;padding:14px}
      h2{font-size:16px;margin:0 0 6px}
      .row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
      label{font-size:14px}
      .muted{font-size:12px;color:#666;margin-top:10px}

      /* Simple toggle switch */
      .switch{position:relative;display:inline-block;width:46px;height:26px}
      .switch input{opacity:0;width:0;height:0}
      .slider{position:absolute;inset:0;background:#e6e6e6;border-radius:999px;transition:background .18s ease}
      .slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;background:#fff;border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,0.12);transition:transform .18s ease}
      input:checked + .slider{background:#22c55e}
      input:checked + .slider:before{transform:translateX(20px)}

      /* subtle container */
      .card{background:linear-gradient(180deg,#fff,#fbfbfb);border-radius:8px;padding:12px;border:1px solid #eee}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="row">
          <label for="toggle">HLTV Fantasy Hard Mode</label>
          <label class="switch">
            <input id="toggle" type="checkbox" aria-label="Enable auto-hide" />
            <span class="slider" aria-hidden="true"></span>
          </label>
        </div>
        <div class="muted">When enabled the trigger rate box on both role choice and booster pages is hidden automatically.</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
